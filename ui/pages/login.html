<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechEdu School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <h2 class="login-title">Bem-vindo de volta</h2>

    <div class="login-form">
      <label class="login-label">E-mail:</label>
      <input class="login-input" type="email" id="login-email">
      <label class="login-label">Senha:</label>
      <input class="login-input" type="password" id="login-senha">
      <a href="#" class="login-forgot">Esqueceu a senha?</a>
      <p id="login-erro" style="color:red; display:none;"></p>
      <button class="login-btn" onclick="fazerLogin()">Continue »</button>
      <div class="login-divider"><span>OR</span></div>
    </div>

    <form action="criarconta.html">
      <button class="login-btn" type="submit">Criar uma conta »</button>
    </form>
  </div>
</div>

<script src="api.js"></script>
<script>
async function fazerLogin() {
  const email = document.getElementById('login-email').value;
  const senha = document.getElementById('login-senha').value;
  const erro  = document.getElementById('login-erro');

  const resultado = await loginUsuario(email, senha);

  if (resultado.id) {
    localStorage.setItem('usuario', JSON.stringify(resultado));
    window.location.href = 'areaaluno.html';
  } else {
    erro.style.display = 'block';
    erro.textContent = resultado.error || 'Email ou senha incorretos.';
  }
}
</script>

</body>
</html>
