<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechEdu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

<header>
    <input type="checkbox" id="toggler">
    <label for="toggler" class="fas fa-bars"></label>
    <a href="index.html" class="logo">TechEdu</a>

    <div class="search-box">
        <input type="text" class="search-txt" placeholder="Pesquisar" id="search-input" oninput="filtrarCursos()">
        <i class="fas fa-search"></i>
    </div>

    <nav class="navbar">
        <a href="index.html">Página de Cursos</a>
        <a href="atendimento.html">Atendimento</a>
        <a href="areaaluno.html">Área do aluno</a>
    </nav>

    <div class="pages">
        <a href="login.html" class="pages-btn">Login</a>
        <i class="ia">/</i>
        <a href="criarconta.html" class="pages-btn">Registre-se</a>
    </div>

    <div class="icons">
        <a href="perfil.html" class="fas fa-user-circle"></a>
    </div>
</header>

<section class="home">
    <div class="content">
        <div class="menu-links">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="areaaluno.html"><i class="fas fa-laptop"></i> Meus Cursos</a>
            <a href="atendimento.html"><i class="fas fa-phone-alt"></i> Contatos</a>
        </div>

        <div class="courses">
            <div class="top-bar">
                <h3>Todos os Cursos</h3>
                <button><i class="fas fa-filter"></i></button>
            </div>
            <div class="course-list" id="course-list">
                <p id="loading-cursos">Carregando cursos...</p>
            </div>
        </div>
    </div>
</section>

<script src="api.js"></script>
<script>
let todosCursos = [];

async function carregarCursos() {
    const lista = document.getElementById('course-list');

    try {
        todosCursos = await listarCursos();
        renderizarCursos(todosCursos);
    } catch (err) {
        lista.innerHTML = '<p style="color:red;">Erro ao carregar cursos. Verifique se o servidor está rodando.</p>';
    }
}

function renderizarCursos(cursos) {
    const lista = document.getElementById('course-list');

    if (!cursos.length) {
        lista.innerHTML = '<p>Nenhum curso encontrado.</p>';
        return;
    }

    lista.innerHTML = '';
    cursos.forEach(curso => {
        const item = document.createElement('a');
        item.href = `desccurso.html?id=${curso.id}`;
        item.className = 'course-item';
        item.innerHTML = `
            <div class="course-card" style="display:flex;align-items:center;justify-content:center;background:#eee;height:120px;">
                <i class="fas fa-laptop" style="font-size:2.5rem;color:#555;"></i>
            </div>
            <span>${curso.nome_curso}</span>
        `;
        lista.appendChild(item);
    });
}

function filtrarCursos() {
    const termo = document.getElementById('search-input').value.toLowerCase();
    const filtrados = todosCursos.filter(c =>
        c.nome_curso.toLowerCase().includes(termo)
    );
    renderizarCursos(filtrados);
}

carregarCursos();
</script>

</body>
</html>
